<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iLuse \u2014 Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #22223a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --accent3: #38bdf8;
    --green: #34d399;
    --orange: #fb923c;
    --pink: #f472b6;
    --red: #f87171;
    --text: #f0f0ff;
    --text2: #9898b8;
    --text3: #5a5a7a;
    --wa-out: #005c4b;
    --wa-in: #1f2c34;
    --wa-bg: #0b141a;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* \u2500\u2500 SIDEBAR \u2500\u2500 */
  .sidebar {
    width: 72px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 6px;
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: white;
    margin-bottom: 18px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(108,99,255,0.4);
  }

  .nav-btn {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    transition: all 0.2s;
    position: relative;
    font-size: 20px;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text2); }
  .nav-btn.active { background: rgba(108,99,255,0.15); color: var(--accent); }
  .nav-btn.active::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 24px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }

  .nav-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    border: 2px solid var(--surface);
  }

  .sidebar-bottom { margin-top: auto; }

  .avatar-sm {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    border: 2px solid var(--border2);
    flex-shrink: 0;
  }

  /* \u2500\u2500 MAIN LAYOUT \u2500\u2500 */
  .app { display: flex; flex: 1; overflow: hidden; }

  .panel {
    display: none;
    flex: 1;
    overflow: hidden;
    flex-direction: column;
  }
  .panel.active { display: flex; }

  /* \u2500\u2500 TOP BAR \u2500\u2500 */
  .topbar {
    height: 60px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 17px;
  }

  .role-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }

  .role-btn {
    padding: 6px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    background: transparent;
    color: var(--text2);
  }
  .role-btn.active { background: var(--accent); color: white; }

  /* \u2500\u2500 SCROLL CONTAINER \u2500\u2500 */
  .scroll { flex: 1; overflow-y: auto; padding: 24px; }
  .scroll::-webkit-scrollbar { width: 4px; }
  .scroll::-webkit-scrollbar-track { background: transparent; }
  .scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  /* \u2500\u2500 SECTION HEADER \u2500\u2500 */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
  }

  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7c73ff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.3); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); }
  .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-green { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

  /* \u2500\u2500 CARDS \u2500\u2500 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all 0.2s;
  }
  .card:hover { border-color: var(--border2); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* \u2500\u2500 DASHBOARD \u2500\u2500 */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
  }

  .stat-label { font-size: 13px; color: var(--text2); }

  .course-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }
  .course-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }

  .course-banner {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    letter-spacing: -1px;
    color: rgba(255,255,255,0.15);
    font-size: 48px;
  }

  .course-info { padding: 16px; }
  .course-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .course-meta { font-size: 12px; color: var(--text2); }

  .progress-bar {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* \u2500\u2500 COURSE DETAIL \u2500\u2500 */
  .course-detail { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .course-detail.active { display: flex; }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--text); background: var(--surface2); }

  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--surface);
  }

  .tab {
    padding: 14px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* \u2500\u2500 MATERIALS \u2500\u2500 */
  .material-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .material-item:hover { border-color: var(--border2); background: var(--surface2); }

  .material-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .material-title { font-size: 14px; font-weight: 500; }
  .material-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .material-actions { margin-left: auto; display: flex; gap: 6px; }

  /* \u2500\u2500 ANNOUNCEMENTS \u2500\u2500 */
  .announcement-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    border-left: 3px solid var(--accent);
  }

  .ann-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ann-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .ann-time { font-size: 11px; color: var(--text3); margin-left: auto; }
  .ann-body { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .badge {
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-accent { background: rgba(108,99,255,0.2); color: var(--accent2); }
  .badge-green { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-orange { background: rgba(251,146,60,0.15); color: var(--orange); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--red); }

  /* \u2500\u2500 WHATSAPP CHAT \u2500\u2500 */
  .chat-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .chat-sidebar {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .chat-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    padding: 9px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); }

  .chat-list { flex: 1; overflow-y: auto; }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: var(--surface3); }

  .chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    flex-shrink: 0;
  }

  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

  .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .chat-time { font-size: 11px; color: var(--text3); }
  .unread-badge {
    background: var(--green);
    color: #000;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* WhatsApp Message Area */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--wa-bg);
    position: relative;
    overflow: hidden;
  }

  .chat-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  .chat-header {
    height: 60px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 1;
    flex-shrink: 0;
  }

  .chat-header-info h3 { font-size: 15px; font-weight: 600; }
  .chat-header-info p { font-size: 12px; color: var(--green); }

  .msg-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 1;
  }
  .msg-area::-webkit-scrollbar { width: 3px; }
  .msg-area::-webkit-scrollbar-thumb { background: var(--surface3); }

  .msg-date {
    text-align: center;
    margin: 10px 0;
  }
  .msg-date span {
    background: rgba(0,0,0,0.4);
    padding: 4px 12px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--text2);
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    margin-bottom: 2px;
  }
  .msg.outgoing { align-self: flex-end; align-items: flex-end; }
  .msg.incoming { align-self: flex-start; align-items: flex-start; }

  .msg-sender { font-size: 11px; color: var(--accent2); font-weight: 600; margin-bottom: 2px; padding-left: 12px; }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.5;
    position: relative;
    word-break: break-word;
  }
  .msg.outgoing .msg-bubble {
    background: var(--wa-out);
    border-radius: 10px 10px 0 10px;
    color: #e9f5f2;
  }
  .msg.incoming .msg-bubble {
    background: var(--wa-in);
    border-radius: 10px 10px 10px 0;
    color: var(--text);
  }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .msg.outgoing .msg-time { color: rgba(255,255,255,0.4); }

  .msg-check { font-size: 12px; color: var(--accent3); }

  .chat-input-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1;
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
  }
  .msg-input::placeholder { color: var(--text3); }
  .msg-input:focus { border-color: rgba(108,99,255,0.4); }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    color: white;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #7c73ff; transform: scale(1.05); }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 18px;
    transition: all 0.2s;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 12px;
    z-index: 1;
  }
  .chat-empty-icon { font-size: 48px; }
  .chat-empty h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text2); }
  .chat-empty p { font-size: 13px; text-align: center; max-width: 240px; line-height: 1.6; }

  /* \u2500\u2500 MODAL \u2500\u2500 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.open { display: flex; }

  .modal {
